<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>King Vibez</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Official website of Afro-Trap artist King Vibez. Music, Videos, Tour, Merch, and more." />
  <meta property="og:title" content="King Vibez - Official Website" />
  <meta property="og:description" content="Listen to King Vibez's latest tracks, watch videos, and shop official merch." />
  <meta property="og:image" content="https://i.ibb.co/Y7dxr9NJ/IMG-20250518-WA0272.jpg" />
  <link rel="icon" href="/public/favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap" rel="stylesheet" />
  <script defer src="script.js"></script>
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.ibb.co/Y7dxr9NJ/IMG-20250518-WA0272.jpg');
      background-size: cover;
      background-position: center;
      text-align: center;
      padding: 2em;
    }
    .hero h1 {
      font-size: 4em;
      font-family: 'Oswald', sans-serif;
      margin: 0.2em 0;
      color: #fff;
      animation: fadeInDown 1s ease;
    }
    .hero p {
      font-size: 1.4em;
      color: #ddd;
      animation: fadeInUp 1s ease 0.5s forwards;
    }
    .btn-group {
      margin-top: 2em;
      display: flex;
      gap: 1em;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 0.8em 1.6em;
      background: #ff6f61;
      color: #fff;
      border: none;
      border-radius: 8px;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #ff3d00;
    }
    section {
      padding: 4em 2em;
      background: #111;
      color: #fff;
    }
    section h2 {
      font-size: 2.5em;
      margin-bottom: 0.5em;
    }
    iframe {
      max-width: 100%;
      border-radius: 12px;
    }
    footer {
      background: #000;
      color: #aaa;
      text-align: center;
      padding: 1.5em 1em;
      font-size: 0.9em;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>King Vibez</h1>
    <p>Afro-Trap King from Lagos, Nigeria 🇳🇬</p>
    <div class="btn-group">
      <button class="btn" onclick="location.href='music.html'">Music</button>
      <button class="btn" onclick="location.href='tour.html'">Tour</button>
      <button class="btn" onclick="location.href='merch.html'">Merch</button>
      <button class="btn" onclick="location.href='contact.html'">Contact</button>
    </div>
  </div>

  <section>
    <h2>Listen Now</h2>
    <iframe src="https://open.spotify.com/embed/track/6rqhFgbbKwnb9MLmUQDhG6" width="100%" height="80" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </section>

  <section>
    <h2>Watch Latest Video</h2>
    <iframe width="100%" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&mute=1" title="YouTube video" allowfullscreen></iframe>
  </section>

  <footer>
    &copy; 2025 King Vibez. All rights reserved.
  </footer>

</body>
</html>
